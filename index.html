<!DOCTYPE html>
<html lang="pt-BR" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Speed</title>
    <meta name="description" content="Good Speed - Fast and Reliable Internet Connection">
    <meta name="keywords" content="internet, speed, connection, fast, reliable">
    <meta property="og:title" content="Good Speed">
    <meta property="og:description" content="Good Speed - Fast and Reliable Internet Connection">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.example.com">
    <meta property="og:image" content="https://www.example.com/image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Good Speed">
    <meta name="twitter:description" content="Good Speed - Fast and Reliable Internet Connection">
    <meta name="twitter:image" content="https://www.example.com/image.jpg">
    <style>
        /* Reset mínimo — menos de 200 bytes */
        *, *::before, *::after { box-sizing: border-box; margin: 0; }
        img { max-width: 100%; height: auto; display: block; }
        input, button, textarea, select { font: inherit; }
        body { background: #ffffff; color: #ffffff; }
        a { text-decoration: none; color: inherit; }
        .navbar__container {display: flex;align-items: center;justify-content: space-between;height: 72px;padding: 0 5% 0 5%;background-color: #312e81;}
        ul{display: flex;gap: 1.5rem;list-style: none;}
        .logo {font-size: 1.5rem;font-weight: 700; color: var(--primary);}
        .btn { background: var(--primary); }
        .navbar { position: fixed; height: 72px; }
        .hero {display: flex;align-items: center;justify-content: center;min-height: 100vh; background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);}
        #hero-title {font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; color: #1e293b;
}
        /* Estilos básicos para acessibilidade */
        .skip-link {position: absolute;top: -40px;left: 0;background: #000;color: #fff;padding: 8px;z-index: 100;}
        .skip-link:focus {top: 0;}
    </style>
    <!-- CSS NÃO-CRÍTICO: carrega sem bloquear -->
    <link rel="preload" href="/css/styles.css" as="style"
            onload="this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="/css/styles.css">
    </noscript>
</head>
<body>
  <a href="#main" class="skip-link">Ir para conteúdo</a>

  <header role="banner">
    <nav aria-label="Navegação principal" class="navbar__container">
      <!-- Logo + links de navegação -->
        <a href="/">
            <img src="/img/logo.svg" alt="Logo da empresa" width="80" height="48" class="logo">
        </a>
        <ul>
            <li><a href="#servicos">Serviços</a></li>
            <li><a href="#sobre">Sobre Nós</a></li>
            <li><a href="#contato">Contato</a></li>
        </ul>
    </nav>
  </header>

  <main id="main">
    <section class="hero" aria-labelledby="hero-title">
      <h1 id="hero-title">Título Principal</h1>
    </section>

    <section class="servicos container" aria-labelledby="servicos-title" id="servicos">
      <h2 id="servicos-title">Nossos Serviços</h2>
      <div class="container">
      <!-- HTML com BEM -->
        <article class="card card--featured">
        <div class="card__image-wrapper">
            <img class="card__image" src="" alt="imagem aquática" width="200px">
        </div>
        <div class="card__content">
            <h3 class="card__title">Título do Card</h3>
            <p class="card__description">Descrição...</p>
            <a class="card__link" href="#">Saiba mais</a>
        </div>
        </article>
        <article class="card card--featured">
        <div class="card__image-wrapper">
            <img class="card__image" src="" alt="imagem aquática" width="200px">
        </div>
        <div class="card__content">
            <h3 class="card__title">Título do Card</h3>
            <p class="card__description">Descrição...</p>
            <a class="card__link" href="#">Saiba mais</a>
        </div>
        </article>
        </div>
    </section>

    <section class="sobre container" aria-labelledby="sobre-title" id="sobre">
      <h2 id="sobre-title">Sobre Nós</h2>
    </section>

    <section class="contato container" aria-labelledby="contato-title" id="contato">
      <h2 id="contato-title">Contato</h2>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Sua Marca</p>
  </footer>
  <script>
    const isDark = matchMedia("(prefers-color-scheme: dark)");
    document.documentElement.dataset.theme = isDark ? "dark" : "light";
    </script>
</body>
</html>
